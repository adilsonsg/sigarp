services:
  postgres:
    image: postgres:16
    container_name: sigarp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sigarp
      POSTGRES_USER: sigarp
      POSTGRES_PASSWORD: sigarp123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigarp -d sigarp"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: sigarp_backend
    restart: unless-stopped
    environment:
      APP_NAME: SIGARP
      APP_VERSION: 0.3.0-alpha1
      APP_ENV: development
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg2://sigarp:sigarp123@postgres:5432/sigarp
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
