name: Security

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "17 10 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Varredura de segredos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout completo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Auditoria de dependências Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configurar Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: pip-audit
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: backend/requirements.txt

  dependency-review:
    name: Revisão de novas dependências
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          show-patched-versions: true
