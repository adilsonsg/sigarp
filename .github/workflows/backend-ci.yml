name: Backend CI

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configurar Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: isort
        run: isort --check-only .

      - name: Pytest
        env:
          APP_ENV: test
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
        run: pytest -v

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validar build Docker
        run: docker build -t sigarp-backend-ci ./backend
