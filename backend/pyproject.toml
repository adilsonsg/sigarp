# Keep these tool settings aligned with ../pyproject.toml. This copy is required
# because the backend Docker image uses backend/ as its isolated build context.

[tool.black]
line-length = 88
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["app"]
known_third_party = ["alembic"]

[tool.ruff]
line-length = 88
target-version = "py312"
src = ["app", "tests"]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "B",
  "UP",
  "N",
  "SIM",
  "RUF",
]
ignore = ["B008"]

[tool.ruff.lint.isort]
known-first-party = ["app"]
